<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News</title>
    <meta name="description" content="Le notizie principali del giorno, aggiornate in tempo reale da Google News.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="app-wrapper">
        <header class="site-header">
            <div class="header-left">
                <h1><i class="fas fa-newspaper"></i> Notizie</h1>
            </div>
            <div class="header-right">
                <span class="last-update" id="lastUpdate">Caricamento...</span>
                <span class="live-badge" id="liveBadge"><span class="live-dot"></span> LIVE</span>
            </div>
        </header>

        <main class="news-container" id="newsContainer">
            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner"></div>
                <p>Caricamento notizie...</p>
            </div>
        </main>

        <button class="load-more-btn" id="loadMoreBtn" style="display: none;">
            <i class="fas fa-plus"></i> Carica altre notizie
        </button>
    </div>

    <!-- Bottom gradient for contrast with buttons -->
    <div class="bottom-gradient"></div>

    <!-- Fixed bottom buttons -->
    <div id="backIcon" class="icon-button">
        <i class="fas fa-arrow-left"></i>
    </div>

    <nav class="bottom-tabs" id="tabsBar">
        <button class="tab-btn active" data-category="top">
            <i class="fas fa-fire"></i> Principali
        </button>
        <button class="tab-btn" data-category="politics">
            <i class="fas fa-landmark"></i> Politica
        </button>
        <button class="tab-btn" data-category="business">
            <i class="fas fa-chart-line"></i> Economia
        </button>
        <button class="tab-btn" data-category="tech">
            <i class="fas fa-flask"></i> Scienza e tech
        </button>
        <button class="tab-btn" data-category="sports">
            <i class="fas fa-futbol"></i> Sport
        </button>
        <button class="tab-btn" data-category="entertainment">
            <i class="fas fa-film"></i> Intrattenimento
        </button>
    </nav>

    <div id="searchIcon" class="icon-button">
        <i class="fas fa-search"></i>
    </div>

    <!-- Search overlay -->
    <div class="overlay" id="overlay"></div>
    <div class="search-modal" id="searchModal">
        <div class="search-modal-header">
            <h3>Cerca notizie</h3>
        </div>
        <div class="search-modal-content">
            <div class="search-input-wrapper">
                <i class="fas fa-search search-icon-input"></i>
                <input type="text" id="searchInput" placeholder="Cerca notizie..." autocomplete="off">
            </div>
        </div>
        <div class="search-modal-footer">
            <button class="modal-btn" id="cancelSearch"><i class="fas fa-arrow-left"></i> Annulla</button>
            <button class="modal-btn" id="searchGoBtn"><i class="fas fa-search"></i> Cerca</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
